<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 NOW</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/weather/styling/weather-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">F1 NOW</div>
    <div class="nav-links">
      <a href="#">Latest Race</a>
      <a href="history.html">History</a>
      <a href="odds.html">Live Odds</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <h1>FORMULA 1<br>RACE CENTER</h1>
      <p><span id="typing-text"></span></p>
    </div>
  </section>

  <section class="upcoming-race">
    <div class="rain-bg"></div>

    <div class="upcoming-inner">
      <h1>Round 4 - Miami International Autodrome</h1>
    </div>

    <div class="wrapper container-fluid px-4">
      <div class="row race-layout justify-content-center align-items-center g-4">

        <div class="col-12 col-lg-3 d-flex justify-content-center">
          <div class="left-glass-card"> 
            <div class="left-card-content">
              <div class="left-title">Results</div>
              <div class="left-results-list"> 
                <div class="left-results-row">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-5 d-flex flex-column align-items-center">
          <section class="carousel">
            <div class="carousel-wrapper">
              <div class="slider">
                <img
                  id="slide-1"
                  src="https://media.formula1.com/image/upload/c_lfill,w_3392/q_auto/v1740000001/content/dam/fom-website/2018-redesign-assets/Racehub%20header%20images%2016x9/Miami.webp"
                  alt="Miami Grand Prix Stock Image"
                >
                <img
                  id="slide-2"
                  src="https://media.formula1.com/image/upload/t_16by9Centre/c_fit,w_1584/q_auto/v1740000001/trackside-images/2025/F1_Grand_Prix_of_Miami/2213410287.webp"
                  alt="Miami Grand Prix Stock Image Crowd View"
                >
                <img
                  id="slide-3"
                  src="https://media.formula1.com/image/upload/c_fit,h_704/q_auto/v1740000001/common/f1/2026/track/2026trackmiamidetailed.webp"
                  alt="Miami Grand Prix 2026 Track Detailed"
                >
              </div>
              <div class="slider-nav">
                <a href="#slide-1"></a>
                <a href="#slide-2"></a>
                <a href="#slide-3"></a>
              </div>
            </div>
          </section>

          <div class="weather-bar mt-3">
            <div class="weather-item">
              <div class="weather-icon-slot"></div>
              <div class="weather-text">
                <span class="weather-temp"></span>
                <span class="weather-condition"></span>
              </div>
            </div>
            
            <div class="weather-item">
              <div class="windy-icon-slot"></div>
              <span class="weather-wind"></span>
            </div>

            <div class="weather-item rain-weather">
              <div class="rain-icon-slot"> </div>
              <span class="weather-rain"></span>
            </div>

            <div class="weather-item">
              <div class="time-icon-slot"> 
                <span class="hour"></span>
                <span class="min"></span>
                <span class="circle"></span>
              </div>
              <span class="weather-time">
                <span class="weather-time-label">Race Time:</span>
                <span class="weather-time-value">1:00 PM</span>
              </span>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-3 d-flex justify-content-center">
          <section class="right-glass-card">
            <div class="right-card-content">
              <div class="right-title">Leaderboard</div>
              <div class="right-results-list"> 
                <div class="right-results-row">
                </div>
              </div>
            </div>
          </section>
        </div>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="assets/weather/script/weather.js"></script>
</body>
</html>
